workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      groups:
        - firebase

      flutter: stable
      xcode: latest
      cocoapods: default

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.bma.arabia

    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Restore Firebase iOS config
        script: |
          echo "$IOS_FIREBASE_PLIST_B64" | base64 --decode > ios/Runner/GoogleService-Info.plist

      - name: Install iOS pods
        script: |
          cd ios
          pod install
          cd ..

      - name: Initialize keychain
        script: |
          keychain initialize

      - name: Fetch iOS signing files
        script: |
          app-store-connect fetch-signing-files com.bma.arabia \
            --type IOS_APP_STORE \
            --create

      - name: Add certificates to keychain
        script: |
          keychain add-certificates

      - name: Set up iOS code signing
        script: |
          xcode-project use-profiles

      - name: Build iOS IPA
        script: |
          flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true