name: bma_app
description: Bride Magazine Arabia — Flutter app
publish_to: 'none'
version: 3.0.1+20


environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # دعم العربية والمحليات
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.6
  go_router: ^14.2.0
  flutter_riverpod: ^2.5.1
  dio: ^5.5.0+1
  intl: ^0.20.2
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  cached_network_image: ^3.3.1
  url_launcher: ^6.3.2
  equatable: ^2.0.5
  json_annotation: ^4.9.0
  flutter_widget_from_html: ^0.17.1
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6
  share_plus: ^10.0.2   # 👈 تمت الإضافة هنا



  firebase_core: 3.15.2
  firebase_messaging: 15.2.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  build_runner: ^2.4.10
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

 # الخطوط
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/cairo/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/cairo/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/cairo/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/cairo/Cairo-Bold.ttf
          weight: 700

    - family: Poppins
      fonts:
        - asset: assets/fonts/poppins/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/poppins/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/poppins/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/poppins/Poppins-Bold.ttf
          weight: 700

  assets:
    # مجلد السبلاش بالكامل
    - assets/splash/
    # تأكيد صريح على ملف الخلفية الذي تستخدمه شاشة Flutter Splash
    - assets/splash/splash_full.png
    - assets/foods.json
    - assets/images/
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  min_sdk_android: 21
  adaptive_icon_foreground: assets/icon/app_icon.png
  adaptive_icon_background: "#000000"          # خلفية سوداء بدون أي إطار أبيض


flutter_native_splash:
  color: "#F7F5F6"              # لون الخلفية الفاتح
  color_dark: "#121212"         # للثيم الداكن

  # صور الخلفية الممتدة (Full-screen)
  background_image: assets/splash/bg_light.png
  background_image_dark: assets/splash/bg_dark.png

  # لا نعرض أي براندينغ إضافي فوق الخلفية
  branding: null
  branding_dark: null

  # iOS: ملء الشاشة
  ios_content_mode: scaleAspectFill

  # Android 12: نكتفي بالخلفية بدون أيقونة وسطية
  android_12:
    image: null
    icon_background_color: "#F7F5F6"
    icon_background_color_dark: "#121212"

  web: false

